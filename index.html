<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseball Games to Watch</title>
    <meta name="description" content="Track your favorite MLB teams and upcoming games with a gorgeous client-side dashboard.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-background"></div>
    <div class="app-container">
        <header class="header neon-border">
            <div class="header-content">
                <div class="logo-area">
                    <span class="logo-icon">⚾</span>
                    <h1>Baseball Games to Watch</h1>
                </div>
                <p class="subtitle">Your customized upcoming game schedule</p>
            </div>
            <div class="header-status">
                <span id="status-indicator" class="status-indicator status-loading"></span>
                <span id="status-text">Fetching live data...</span>
            </div>
        </header>

        <main class="dashboard">
            <section class="teams-section glass-panel">
                <div class="section-header">
                    <h2><span class="icon">⭐</span> My Teams</h2>
                    <span class="badge" id="team-count">0</span>
                </div>
                <div id="teams-container" class="teams-container">
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <p>Syncing from Google Sheets...</p>
                    </div>
                </div>
            </section>

            <section class="games-section glass-panel">
                <div class="section-header">
                    <h2><span class="icon">📅</span> Upcoming Games (Next 3 Days)</h2>
                    <div class="date-range" id="date-range">...</div>
                </div>
                <div id="games-container" class="games-container">
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <p>Loading MLB Schedule...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
